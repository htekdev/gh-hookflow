name: Test Coverage Enforcement
description: Ensures code changes maintain minimum test coverage before commit

on:
  commit:
    lifecycle: pre
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'packages/**'
    paths-ignore:
      - '**/*.md'

blocking: true

steps:
  - name: Run tests with coverage
    run: |
      $goCmd = if (Get-Command go -ErrorAction SilentlyContinue) { "go" } else { "C:\Program Files\Go\bin\go.exe" }
      & $goCmd test ./cmd/... ./internal/... -coverprofile coverage.out -covermode atomic -timeout 600s
      if ($LASTEXITCODE -ne 0) {
        Write-Error "Tests failed"
        exit 1
      }

  - name: Check coverage threshold
    run: |
      $goCmd = if (Get-Command go -ErrorAction SilentlyContinue) { "go" } else { "C:\Program Files\Go\bin\go.exe" }
      $threshold = 70
      $output = & $goCmd tool cover -func coverage.out | Select-String "total:"
      if ($output -match '(\d+\.?\d*)%') {
        $coverage = [double]$matches[1]
        Write-Host "Total coverage: $coverage%"
        if ($coverage -lt $threshold) {
          Write-Error "Coverage $coverage% is below $threshold% threshold"
          exit 1
        }
        Write-Host "Coverage meets threshold"
      } else {
        Write-Error "Could not parse coverage output"
        exit 1
      }

  - name: Cleanup
    run: |
      if (Test-Path coverage.out) { Remove-Item coverage.out }