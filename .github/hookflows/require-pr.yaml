name: Require PR Before Push
description: Blocks pushes on feature branches without an open pull request

on:
  push:
    lifecycle: pre

blocking: true

steps:
  - name: Check for open PR
    run: |
      $branch = git rev-parse --abbrev-ref HEAD
      Write-Host "Branch: $branch"

      if ($branch -eq "main" -or $branch -eq "master") {
        Write-Host "Pushing to $branch - no PR required."
        exit 0
      }

      $prJson = gh pr list --head $branch --json number,url,title --limit 1 2>$null
      if (!$prJson -or $prJson -eq "[]") {
        Write-Host ""
        Write-Host "No open PR found for branch: $branch"
        Write-Host ""
        Write-Host "Create one first with: gh pr create"
        Write-Host ""
        Write-Host "All feature branches must have an open PR before pushing."
        exit 1
      }

      $pr = ($prJson | ConvertFrom-Json)[0]
      Write-Host "Found PR #$($pr.number): $($pr.title)"
      Write-Host "URL: $($pr.url)"
      Write-Host "Push allowed."
