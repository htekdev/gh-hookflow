name: PR Check Monitor
description: After push, monitors linked PR checks and reports results back to the agent

on:
  push:
    lifecycle: post

blocking: false

steps:
  - name: Find linked PR
    run: |
      $branch = git rev-parse --abbrev-ref HEAD
      Write-Host "Branch: $branch"

      if ($branch -eq "main" -or $branch -eq "master") {
        Write-Host "Direct push to $branch - no PR to monitor"
        exit 0
      }

      $prJson = gh pr list --head $branch --json number,url,title --limit 1 2>$null
      if (!$prJson -or $prJson -eq "[]") {
        Write-Host "No open PR found for branch '$branch'."
        Write-Host "Create one with: gh pr create"
        Write-Host ""
        Write-Host "All feature branches must have an open PR before pushing."
        exit 1
      }

      $pr = $prJson | ConvertFrom-Json | Select-Object -First 1
      Write-Host "Found PR #$($pr.number): $($pr.title)"
      Write-Host "URL: $($pr.url)"

      # Store PR number for next step
      $env:PR_NUMBER = $pr.number

  - name: Monitor PR checks
    run: |
      $branch = git rev-parse --abbrev-ref HEAD
      $headSha = git rev-parse HEAD
      $prJson = gh pr list --head $branch --json number,title --limit 1 2>$null

      if (!$prJson -or $prJson -eq "[]") {
        exit 1
      }

      $pr = ($prJson | ConvertFrom-Json)[0]
      $prNumber = $pr.number

      Write-Host ""
      Write-Host "Monitoring checks for PR #$prNumber (commit $($headSha.Substring(0,7)))..."
      Write-Host ""

      # Wait for GitHub to register the new commit against the PR
      $maxWait = 90
      $waited = 0
      while ($waited -lt $maxWait) {
        $prHead = (gh pr view $prNumber --json headRefOid --jq '.headRefOid') 2>$null
        if ($prHead -and $prHead.Trim() -eq $headSha) {
          Write-Host "PR head matches pushed commit."
          break
        }
        Start-Sleep -Seconds 5
        $waited += 5
        Write-Host "Waiting for PR to update to pushed commit... ($waited`s)"
      }

      if ($waited -ge $maxWait) {
        Write-Host "Timed out waiting for PR head to update. Checking current state..."
      }

      # Wait for checks to appear for the new commit
      $maxWait = 60
      $waited = 0
      while ($waited -lt $maxWait) {
        $checksJson = gh pr checks $prNumber --json name,state 2>$null
        if ($checksJson -and $checksJson -ne "[]") {
          $checks = $checksJson | ConvertFrom-Json
          $pending = ($checks | Where-Object { $_.state -eq "PENDING" -or $_.state -eq "QUEUED" -or $_.state -eq "IN_PROGRESS" }).Count
          if ($pending -gt 0) {
            Write-Host "Found $($checks.Count) checks ($pending pending). Waiting for completion..."
            break
          }
        }
        Start-Sleep -Seconds 5
        $waited += 5
        Write-Host "Waiting for new checks to start... ($waited`s)"
      }

      if (!$checksJson -or $checksJson -eq "[]") {
        Write-Host "No CI checks configured for this PR"
        exit 0
      }

      # Use gh pr checks --watch to wait for all checks to complete
      Write-Host "Waiting for all checks to complete..."
      $result = gh pr checks $prNumber --watch 2>&1

      # Get final status
      $finalChecks = gh pr checks $prNumber --json name,state 2>$null
      if ($finalChecks) {
        $checks = $finalChecks | ConvertFrom-Json
        $total = $checks.Count
        $passed = ($checks | Where-Object { $_.state -eq "SUCCESS" }).Count
        $failed = ($checks | Where-Object { $_.state -eq "FAILURE" }).Count
        $other = $total - $passed - $failed

        Write-Host ""
        Write-Host "=== PR Check Results ==="
        Write-Host "Total:  $total"
        Write-Host "Passed: $passed"
        Write-Host "Failed: $failed"

        if ($other -gt 0) {
          Write-Host "Other:  $other"
        }

        Write-Host ""
        foreach ($check in $checks) {
          $icon = if ($check.state -eq "SUCCESS") { "pass" } elseif ($check.state -eq "FAILURE") { "FAIL" } else { "?   " }
          Write-Host "  [$icon] $($check.name)"
        }
        Write-Host ""

        if ($failed -gt 0) {
          Write-Host "CI checks failed. Review failures above and fix before merging."
          exit 1
        }

        Write-Host "All CI checks passed!"
      }
