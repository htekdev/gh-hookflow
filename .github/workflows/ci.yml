name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      
      - name: Run tests with coverage
        run: go test ./... -v -race -coverprofile=coverage.out -covermode=atomic

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 70" | bc -l) )); then
            echo "Coverage ${COVERAGE}% is below 70% threshold"
            exit 1
          fi

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out

  e2e-suite:
    name: E2E Suite (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install PowerShell (if needed)
        if: runner.os == 'Linux'
        run: |
          if ! command -v pwsh &> /dev/null; then
            echo "pwsh not found, skipping (pre-installed on GitHub runners)"
          fi

      - name: Run E2E test suite
        run: go test ./tests/e2e/... -v -timeout 300s

      - name: Check E2E coverage threshold (80%)
        if: always()
        shell: bash
        run: |
          if [ ! -f e2e-coverage.out ]; then
            echo "e2e-coverage.out not found — tests may have failed before coverage merge"
            exit 1
          fi
          COVERAGE=$(go tool cover -func=e2e-coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "E2E binary coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "::warning::E2E coverage ${COVERAGE}% is below 80% threshold"
          fi

      - name: Upload E2E coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-coverage-${{ matrix.os }}
          path: e2e-coverage.out

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
            ext: .exe
          - goos: windows
            goarch: arm64
            ext: .exe
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -o bin/hookflow-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./cmd/hookflow

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hookflow-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/hookflow-*
